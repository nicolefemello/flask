<!doctype html>
<html>
  <head>
    <title>Login</title>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='style.css') }}"
    />
  </head>
  <body>
    <h2>Acessar Conta</h2>
    <form method="POST">
      <input
        type="text"
        name="usuario"
        placeholder="Nome de usuário"
        required
      /><br />
      <input
        type="password"
        name="senha"
        placeholder="Sua senha"
        required
      /><br />
      <button type="submit">Entrar</button>
    </form>
    <p>Não tem conta? <a href="/cadastro">Cadastre-se</a></p>
  </body>
</html>
