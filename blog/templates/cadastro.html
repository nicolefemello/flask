<!doctype html>
<html>
  <head>
    <title>Cadastro</title>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='style.css') }}"
    />
  </head>
  <body>
    <main>
      <h2>Cadastrar Nova Conta</h2>
      <form method="POST">
        <input
          type="text"
          name="usuario"
          placeholder="Nome de usuário"
          required
        /><br />
        <input
          type="password"
          name="senha"
          placeholder="Sua senha"
          required
        /><br />
        <button type="submit">Cadastrar</button>
      </form>
      <p>Não tem conta? <a href="/login">Faça login</a></p>
    </main>
  </body>
</html>
